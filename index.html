<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>livemap.nyc — Summer 2026</title>
  <meta name="description" content="Explore NYC Summer 2026 — live. Curated maps and guides to help New Yorkers and visitors discover small businesses across all five boroughs." />

  <style>
    :root{
      --bg:#f6f7f9;
      --panel:#ffffff;
      --text:#0b1220;
      --muted:#5a667a;
      --line:rgba(15, 23, 42, .10);
      --shadow: 0 10px 30px rgba(15, 23, 42, .08);
      --shadow2: 0 6px 18px rgba(15, 23, 42, .08);
      --radius:18px;
      --radius2:14px;
      --accent:#2563eb; /* clean enterprise blue */
      --font: ui-sans-serif, system-ui, -apple-system, "SF Pro Display", "SF Pro Text", Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family:var(--font);
      background: var(--bg);
      color:var(--text);
    }

    a{ color:inherit; text-decoration:none; }

    /* Header */
    header{
      position:fixed;
      top:0; left:0; right:0;
      z-index:50;
      background: rgba(255,255,255,.78);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--line);
    }
    .wrap{ width:min(1160px, calc(100% - 28px)); margin:0 auto; }
    .bar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:12px 0;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      font-weight:800;
      letter-spacing:-.2px;
    }
    .logo{
      width:30px;height:30px;border-radius:10px;
      background: radial-gradient(circle at 30% 30%, rgba(37,99,235,.35), transparent 55%),
                  radial-gradient(circle at 70% 60%, rgba(37,99,235,.18), transparent 55%),
                  #eaf0ff;
      border:1px solid rgba(37,99,235,.18);
    }

    nav{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      justify-content:flex-end;
      align-items:center;
    }
    .tab{
      border:1px solid transparent;
      background: transparent;
      color: var(--muted);
      font-weight:700;
      padding:9px 10px;
      border-radius:999px;
      cursor:pointer;
      font-size:13px;
      line-height:1;
    }
    .tab:hover{
      background: rgba(15,23,42,.04);
      color: var(--text);
    }
    .tab.active{
      background: rgba(37,99,235,.10);
      border-color: rgba(37,99,235,.18);
      color: var(--text);
    }

    .cta{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:10px 12px;
      border-radius:999px;
      background: var(--accent);
      color:white;
      font-weight:800;
      border:0;
      cursor:pointer;
      box-shadow: var(--shadow2);
      white-space:nowrap;
    }
    .cta:hover{ filter: brightness(.98); }

    main{ padding-top:74px; }

    /* Hero */
    .hero{ padding:18px 0 10px; }
    .heroCard{
      background: var(--panel);
      border:1px solid var(--line);
      border-radius: 24px;
      padding:18px 18px 16px;
      box-shadow: var(--shadow);
    }
    h1{
      margin:0;
      font-size: clamp(22px, 2.2vw, 30px);
      letter-spacing:-.4px;
    }
    .subtitle{
      margin:8px 0 0;
      color:var(--muted);
      font-weight:600;
      max-width: 92ch;
      line-height:1.35;
    }
    .heroRow{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
      margin-top:12px;
    }
    .search{
      width:min(560px, 100%);
      display:flex;
      gap:10px;
      align-items:center;
    }
    input[type="search"]{
      width:100%;
      padding:12px 12px;
      border-radius: 14px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      outline:none;
      font-weight:650;
    }
    input::placeholder{ color: #8892a6; font-weight:550; }

    .quick{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }
    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding:10px 12px;
      border-radius: 999px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      font-weight:750;
      cursor:pointer;
      white-space:nowrap;
    }
    .btn:hover{ background: rgba(15,23,42,.02); }
    .btnPrimary{
      background: rgba(37,99,235,.10);
      border-color: rgba(37,99,235,.20);
      color: var(--text);
    }

    /* Cards */
    .grid{
      display:grid;
      gap:12px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      padding: 14px 0 28px;
    }
    @media (max-width: 980px){ .grid{ grid-template-columns: repeat(2, minmax(0, 1fr)); } }
    @media (max-width: 640px){
      nav{ display:none; }
      .grid{ grid-template-columns: 1fr; }
    }

    .card{
      background: var(--panel);
      border:1px solid var(--line);
      border-radius: var(--radius);
      overflow:hidden;
      box-shadow: var(--shadow2);
      cursor:pointer;
      transition: transform .08s ease, box-shadow .08s ease;
      min-height: 260px;
      display:flex;
      flex-direction:column;
    }
    .card:hover{
      transform: translateY(-1px);
      box-shadow: 0 14px 36px rgba(15,23,42,.10);
    }

    .thumb{
      height: 150px;
      background: linear-gradient(180deg, rgba(37,99,235,.10), rgba(15,23,42,.03));
      position:relative;
      border-bottom:1px solid var(--line);
      overflow:hidden;
    }
    .thumb img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .badge{
      position:absolute;
      left:12px;
      top:12px;
      background: rgba(255,255,255,.88);
      border:1px solid rgba(15,23,42,.10);
      border-radius: 999px;
      padding: 6px 10px;
      font-weight:800;
      font-size:12px;
      display:flex;
      gap:8px;
      align-items:center;
      color: var(--text);
    }
    .badge .flag{ font-size:14px; }

    .body{
      padding: 12px 12px 14px;
      display:flex;
      flex-direction:column;
      gap:8px;
      flex:1 1 auto;
    }
    .title{
      font-weight:850;
      letter-spacing:-.2px;
      line-height:1.15;
      margin:0;
      font-size:15px;
    }
    .meta{
      color: var(--muted);
      font-weight:600;
      font-size:13px;
      line-height:1.25;
      margin:0;
    }
    .actions{
      margin-top:auto;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
    }
    .open{
      font-weight:850;
      color: var(--accent);
      font-size:13px;
    }
    .pill{
      border:1px solid var(--line);
      border-radius:999px;
      padding:7px 9px;
      background: rgba(15,23,42,.02);
      color: var(--muted);
      font-weight:750;
      font-size:12px;
      white-space:nowrap;
    }

    footer{
      border-top:1px solid var(--line);
      padding: 18px 0 24px;
      color: var(--muted);
      font-size:12.5px;
    }
    .footRow{
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      align-items:center;
    }
  </style>
</head>

<body>
<header>
  <div class="wrap">
    <div class="bar">
      <div class="brand">
        <div class="logo" aria-hidden="true"></div>
        <div>livemap.nyc</div>
      </div>

      <nav aria-label="Map tabs">
        <button class="tab active" data-tab="explore">Explore</button>
        <button class="tab" data-tab="country">By Country</button>
        <button class="tab" data-tab="neighborhood">Neighborhoods</button>
        <button class="tab" data-tab="events">Events</button>
        <button class="tab" data-tab="watch">Watch Parties</button>
      </nav>

      <a class="cta" href="https://livexyz.com/summer2026" target="_blank" rel="noopener">
        Promote Your Storefront (Free)
      </a>
    </div>
  </div>
</header>

<main>
  <div class="wrap">
    <section class="hero">
      <div class="heroCard">
        <h1 id="heading">Explore NYC Summer 2026 — live.</h1>
        <p class="subtitle" id="subheading">
          Choose a curated map below. Each map opens in a new tab so you stay focused on content.
        </p>

        <div class="heroRow">
          <div class="search">
            <input id="q" type="search" placeholder="Search this tab (e.g., France, Astoria, Sail4th, Sports Bars)..." autocomplete="off" />
          </div>
          <div class="quick">
            <button class="btn btnPrimary" id="openGeneral">Open Live NYC Map</button>
            <button class="btn" id="copyLink">Copy Library Link</button>
          </div>
        </div>
      </div>
    </section>

    <section>
      <div class="grid" id="grid"></div>
    </section>

    <footer>
      <div class="footRow">
        <div><b style="color:var(--text)">livemap.nyc</b> • Live XYZ</div>
        <div>Maps open on <b>share.livexyz.com</b>. This page is a lightweight, shareable library.</div>
      </div>
    </footer>
  </div>
</main>

<script>
  // --- Helpers ---
  function embedToShareUrl(embedSrc){
    const u = new URL(embedSrc);
    const share = new URL("https://share.livexyz.com/");
    for (const [k,v] of u.searchParams.entries()) share.searchParams.set(k,v);
    return share.toString();
  }

  // Screenshot thumbnails for map pages (works well on GitHub Pages)
  // If you don't want a third-party thumbnail service later, we can replace these with your own hosted thumbnails.
  function thumbFromUrl(url){
    // thum.io grabs a live screenshot of any URL and returns an image
    const enc = encodeURIComponent(url);
    return `https://image.thum.io/get/width/1200/crop/800/noanimate/${enc}`;
  }

  function openMap(url){
    window.open(url, "_blank", "noopener,noreferrer");
  }

  // --- Copy per tab ---
  const TAB_COPY = {
    explore: {
      heading: "Explore NYC Summer 2026 — live.",
      sub: "Choose a curated map below. Each map opens in a new tab so you stay focused on content."
    },
    country: {
      heading: "By Country",
      sub: "Find bars & restaurants by national cuisine — ideal for World Cup fan communities."
    },
    neighborhood: {
      heading: "Neighborhoods & Corridors",
      sub: "Browse the city geographically — boroughs, neighborhoods, and corridors."
    },
    events: {
      heading: "Special Events",
      sub: "World Cup moments, Sail4th viewing, and seasonal highlights."
    },
    watch: {
      heading: "Watch Parties",
      sub: "Match-friendly places — sports bars and watch party hubs."
    }
  };

  // --- Data ---
  // You can keep adding items; cards auto-render.
  // Fields:
  //  - title, meta, url
  //  - badge: small label (e.g., "Country", "Neighborhood", "Event")
  //  - flag: emoji flag (optional)
  //  - thumb: (optional) custom thumbnail URL
  const MAPS = {
    explore: [
      { title:"Live NYC Map (General)", meta:"All places • all boroughs", url:"https://share.livexyz.com/", badge:"Explore", thumb: thumbFromUrl("https://share.livexyz.com/") },
      { title:"Sports Bars (Watch Parties)", meta:"Dark theme • subway lines on", url:"https://share.livexyz.com/?theme=dark&tags=5511be4737345d0003000601&pinSize=large&pinColor=&zoom=10.25&bearing=&lat=40.741598&lng=-73.943009&showSubwayLines=", badge:"Watch", thumb: thumbFromUrl("https://share.livexyz.com/?theme=dark&tags=5511be4737345d0003000601&pinSize=large&pinColor=&zoom=10.25&bearing=&lat=40.741598&lng=-73.943009&showSubwayLines=") }
    ],

    watch: [
      { title:"Sports Bars", meta:"Watch parties • match-friendly spots", url:"https://share.livexyz.com/?theme=dark&tags=5511be4737345d0003000601&pinSize=large&pinColor=&zoom=10.25&bearing=&lat=40.741598&lng=-73.943009&showSubwayLines=", badge:"Watch", thumb: thumbFromUrl("https://share.livexyz.com/?theme=dark&tags=5511be4737345d0003000601&pinSize=large&pinColor=&zoom=10.25&bearing=&lat=40.741598&lng=-73.943009&showSubwayLines=") }
    ],

    events: [
      { title:"Sail4th Parade Viewings (Coming Soon)", meta:"Add the share URL when ready", url:"https://share.livexyz.com/", badge:"Event", thumb: thumbFromUrl("https://share.livexyz.com/") },
      { title:"World Cup Events (Coming Soon)", meta:"Add curated event maplists here", url:"https://share.livexyz.com/", badge:"Event", thumb: thumbFromUrl("https://share.livexyz.com/") }
    ],

    neighborhood: [
      { title:"Manhattan", meta:"Borough maplist", url:"https://share.livexyz.com/maplist/66b0f13a48e5da0007cfa226", badge:"Borough", thumb: thumbFromUrl("https://share.livexyz.com/maplist/66b0f13a48e5da0007cfa226") },
      { title:"Brooklyn", meta:"Borough maplist", url:"https://share.livexyz.com/maplist/66b0f12548e5da0007cfa20a", badge:"Borough", thumb: thumbFromUrl("https://share.livexyz.com/maplist/66b0f12548e5da0007cfa20a") },
      { title:"Queens", meta:"Borough maplist", url:"https://share.livexyz.com/maplist/66b0f15048e5da0007cfa24b", badge:"Borough", thumb: thumbFromUrl("https://share.livexyz.com/maplist/66b0f15048e5da0007cfa24b") },
      { title:"The Bronx", meta:"Borough maplist", url:"https://share.livexyz.com/maplist/66b0f17b48e5da0007cfa28b", badge:"Borough", thumb: thumbFromUrl("https://share.livexyz.com/maplist/66b0f17b48e5da0007cfa28b") },
      { title:"Staten Island", meta:"Borough maplist", url:"https://share.livexyz.com/maplist/66b0f16648e5da0007cfa270", badge:"Borough", thumb: thumbFromUrl("https://share.livexyz.com/maplist/66b0f16648e5da0007cfa270") },
      { title:"Astoria", meta:"Neighborhood maplist", url:"https://share.livexyz.com/maplist/66b0f20948e5da0007cfa31f", badge:"Neighborhood", thumb: thumbFromUrl("https://share.livexyz.com/maplist/66b0f20948e5da0007cfa31f") },
      { title:"SoHo", meta:"Neighborhood maplist", url:"https://share.livexyz.com/maplist/66b0ff9448e5da0007cfb454", badge:"Neighborhood", thumb: thumbFromUrl("https://share.livexyz.com/maplist/66b0ff9448e5da0007cfb454") }
    ],

    country: [
      // Countries/regions from your embed list (these open the share version)
      { title:"Afghan Restaurant", meta:"Cuisine map", url: embedToShareUrl("https://embed.livexyz.com/embed.js?theme=dark&tags=5511be5237345d0003000633&pinSize=large&pinColor=&zoom=10.25&bearing=&lat=40.741598&lng=-73.943009&showSubwayLines="), badge:"Country", flag:"🇦🇫", thumb: thumbFromUrl(embedToShareUrl("https://embed.livexyz.com/embed.js?theme=dark&tags=5511be5237345d0003000633&pinSize=large&pinColor=&zoom=10.25&bearing=&lat=40.741598&lng=-73.943009&showSubwayLines=")) },

      { title:"Argentine Restaurant", meta:"Cuisine map", url: embedToShareUrl("https://embed.livexyz.com/embed.js?theme=dark&tags=5511be5a3d42bd000300061f&pinSize=large&pinColor=&zoom=10.25&bearing=&lat=40.741598&lng=-73.943009&showSubwayLines="), badge:"Country", flag:"🇦🇷", thumb: thumbFromUrl(embedToShareUrl("https://embed.livexyz.com/embed.js?theme=dark&tags=5511be5a3d42bd000300061f&pinSize=large&pinColor=&zoom=10.25&bearing=&lat=40.741598&lng=-73.943009&showSubwayLines=")) },

      { title:"Brazilian Restaurant", meta:"Cuisine map", url: embedToShareUrl("https://embed.livexyz.com/embed.js?theme=dark&tags=5511be553d42bd0003000605&pinSize=large&pinColor=&zoom=10.25&bearing=&lat=40.741598&lng=-73.943009&showSubwayLines="), badge:"Country", flag:"🇧🇷", thumb: thumbFromUrl(embedToShareUrl("https://embed.livexyz.com/embed.js?theme=dark&tags=5511be553d42bd0003000605&pinSize=large&pinColor=&zoom=10.25&bearing=&lat=40.741598&lng=-73.943009&showSubwayLines=")) },

      { title:"French Restaurant", meta:"Cuisine map", url: embedToShareUrl("https://embed.livexyz.com/embed.js?theme=dark&tags=5511be5937345d0003000655&pinSize=large&pinColor=&zoom=10.25&bearing=&lat=40.741598&lng=-73.943009&showSubwayLines="), badge:"Country", flag:"🇫🇷", thumb: thumbFromUrl(embedToShareUrl("https://embed.livexyz.com/embed.js?theme=dark&tags=5511be5937345d0003000655&pinSize=large&pinColor=&zoom=10.25&bearing=&lat=40.741598&lng=-73.943009&showSubwayLines=")) },

      { title:"German Restaurant", meta:"Cuisine map", url: embedToShareUrl("https://embed.livexyz.com/embed.js?theme=dark&tags=5511be8537345d0003000715&pinSize=large&pinColor=&zoom=10.25&bearing=&lat=40.741598&lng=-73.943009&showSubwayLines="), badge:"Country", flag:"🇩🇪", thumb: thumbFromUrl(embedToShareUrl("https://embed.livexyz.com/embed.js?theme=dark&tags=5511be8537345d0003000715&pinSize=large&pinColor=&zoom=10.25&bearing=&lat=40.741598&lng=-73.943009&showSubwayLines=")) }
    ]
  };

  // --- App ---
  let activeTab = "explore";
  const gridEl = document.getElementById("grid");
  const qEl = document.getElementById("q");
  const headingEl = document.getElementById("heading");
  const subEl = document.getElementById("subheading");

  function setActiveTab(tab){
    activeTab = tab;
    headingEl.textContent = TAB_COPY[tab]?.heading || "Maps";
    subEl.textContent = TAB_COPY[tab]?.sub || "";
    document.querySelectorAll(".tab").forEach(b => b.classList.toggle("active", b.dataset.tab === tab));
    qEl.value = "";
    render();
  }

  function render(){
    const q = qEl.value.trim().toLowerCase();
    const rows = (MAPS[activeTab] || []).filter(x => {
      if(!q) return true;
      return (x.title||"").toLowerCase().includes(q) || (x.meta||"").toLowerCase().includes(q);
    });

    gridEl.innerHTML = "";

    rows.forEach(x => {
      const card = document.createElement("div");
      card.className = "card";
      card.addEventListener("click", () => openMap(x.url));

      const flag = x.flag ? `<span class="flag">${x.flag}</span>` : "";
      const badge = x.badge ? `<div class="badge">${flag}<span>${x.badge}</span></div>` : "";

      const thumb = x.thumb
        ? `<img src="${x.thumb}" alt="Preview for ${x.title}" loading="lazy" referrerpolicy="no-referrer"
               onerror="this.style.display='none'; this.parentElement.style.background='linear-gradient(180deg, rgba(37,99,235,.10), rgba(15,23,42,.03))';" />`
        : "";

      card.innerHTML = `
        <div class="thumb">
          ${thumb}
          ${badge}
        </div>
        <div class="body">
          <p class="title">${x.title}</p>
          <p class="meta">${x.meta || ""}</p>
          <div class="actions">
            <span class="open">Open in new tab →</span>
            <span class="pill">share.livexyz.com</span>
          </div>
        </div>
      `;

      gridEl.appendChild(card);
    });

    if(rows.length === 0){
      const empty = document.createElement("div");
      empty.style.padding = "10px 2px 0";
      empty.style.color = "var(--muted)";
      empty.style.fontWeight = "650";
      empty.textContent = "No matches. Try a different search.";
      gridEl.appendChild(empty);
    }
  }

  document.querySelectorAll(".tab").forEach(b => b.addEventListener("click", () => setActiveTab(b.dataset.tab)));
  qEl.addEventListener("input", render);

  document.getElementById("openGeneral").addEventListener("click", () => openMap("https://share.livexyz.com/"));
  document.getElementById("copyLink").addEventListener("click", async () => {
    try{
      await navigator.clipboard.writeText(window.location.href);
      const btn = document.getElementById("copyLink");
      const prev = btn.textContent;
      btn.textContent = "Copied";
      setTimeout(() => btn.textContent = prev, 900);
    }catch(e){
      alert("Copy failed — you can manually copy the URL from the address bar.");
    }
  });

  // Init
  setActiveTab("explore");
</script>
</body>
</html>
